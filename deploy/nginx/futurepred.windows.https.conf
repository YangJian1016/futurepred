# HTTP: only used for ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Optional: keep this if using HTTP-01 challenge and placing files manually
    location ^~ /.well-known/acme-challenge/ {
        root C:/nginx-1.28.3/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main site
server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com www.your-domain.com;

    root C:/Deploy/FuturePred/frontend/dist;
    index index.html;

    # Replace with your real certificate paths
    ssl_certificate     C:/nginx-1.28.3/conf/certs/fullchain.pem;
    ssl_certificate_key C:/nginx-1.28.3/conf/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 12m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/ {
        proxy_pass http://futurepred_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 180s;
    }

    location /generated/ {
        proxy_pass http://futurepred_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://futurepred_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
